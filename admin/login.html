<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anterin Admin — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #141617;
            color: #EAE6DF;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .login-card {
            background: #1A1D1E;
            border: 1px solid #333839;
            border-radius: 20px;
            padding: 48px 32px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        .login-card h1 { font-size: 1.5rem; margin-bottom: 8px; }
        .login-card p { color: #A9ADA9; font-size: 0.9rem; margin-bottom: 32px; }
        .login-card input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #333839;
            border-radius: 12px;
            background: #262A2B;
            color: #EAE6DF;
            font-family: inherit;
            font-size: 1rem;
            margin-bottom: 16px;
        }
        .login-card input:focus { outline: none; border-color: #7FA998; }
        .login-card button {
            width: 100%;
            padding: 14px;
            background: #7FA998;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .login-card button:hover { background: #648A7A; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Anterin Admin</h1>
        <p>Masukkan password untuk mengakses dashboard.</p>
        <form id="loginForm">
            <input type="password" id="pw" placeholder="Password admin" required>
            <button type="submit">Masuk</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const pw = document.getElementById('pw').value;
            window.location.href = `/admin?pw=${encodeURIComponent(pw)}`;
        });
    </script>
</body>
</html>
