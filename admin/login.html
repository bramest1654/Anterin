<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anterin Admin — Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* DEFAULTS: LIGHT */
            --bg-deep: #ffffff;
            --bg-card: #ffffff;
            --accent-gold: #EAB308;
            --text-main: #000000;
            --text-dim: #64748b;
            --border: #e2e8f0;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-deep: #060B1E;
                --bg-card: #0A1128;
                --text-main: #FFFFFF;
                --text-dim: #94A3B8;
                --border: rgba(234, 179, 8, 0.2);
                --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg-deep);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            overflow: hidden;
            position: relative;
            transition: background 0.4s ease;
        }

        /* Background Glow Decor */
        body::before {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(234, 179, 8, 0.08) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            z-index: -1;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 60px 40px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
            animation: cardEntrance 0.8s ease-out;
        }

        @media (prefers-color-scheme: dark) {
            .login-card {
                border: 1px solid rgba(234, 179, 8, 0.2);
            }
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-icon {
            width: 80px;
            height: 80px;
            background: rgba(234, 179, 8, 0.1);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 32px;
            color: var(--accent-gold);
            font-size: 2.2rem;
            border: 1px solid var(--border);
        }

        .login-card h1 { 
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem; 
            font-weight: 700;
            margin-bottom: 12px; 
            letter-spacing: -0.5px;
            color: var(--text-primary);
        }

        @media (prefers-color-scheme: dark) {
            .login-card h1 {
                background: linear-gradient(135deg, #FFF 0%, var(--accent-gold) 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
        }

        .login-card p { 
            color: var(--text-dim); 
            font-size: 1rem; 
            margin-bottom: 40px; 
            font-weight: 500;
        }

        .input-group {
            position: relative;
            margin-bottom: 24px;
        }

        .input-group i {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            transition: var(--transition);
        }

        .login-card input {
            width: 100%;
            padding: 18px 18px 18px 56px;
            border: 2px solid transparent;
            border-radius: 18px;
            background: rgba(0, 0, 0, 0.03);
            color: var(--text-main);
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
        }

        @media (prefers-color-scheme: dark) {
            .login-card input {
                background: rgba(255, 255, 255, 0.03);
            }
        }

        .login-card input:focus { 
            outline: none; 
            background: rgba(0, 0, 0, 0.01);
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 4px rgba(234, 179, 8, 0.1);
        }

        @media (prefers-color-scheme: dark) {
            .login-card input:focus { background: rgba(255, 255, 255, 0.05); }
        }

        .login-card input:focus + i {
            color: var(--accent-gold);
        }

        .login-card button {
            width: 100%;
            padding: 20px;
            background: var(--accent-gold);
            color: #000;
            border: none;
            border-radius: 18px;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 800;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 20px -5px rgba(234, 179, 8, 0.3);
        }

        .login-card button:hover { 
            transform: translateY(-2px);
            box-shadow: 0 20px 30px -10px rgba(234, 179, 8, 0.4);
            filter: brightness(1.05);
        }

        .footer-text {
            margin-top: 40px;
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 500;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 40px 24px;
                border-radius: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-icon">
            <i class="fa-solid fa-shield-halved"></i>
        </div>
        <h1>Anterin Admin</h1>
        <p>Security Area. Please authorize to continue.</p>
        
        <form id="loginForm">
            <div class="input-group">
                <i class="fa-solid fa-key"></i>
                <input type="password" id="pw" placeholder="Admin Access Token" required autofocus>
            </div>
            <button type="submit">
                Authorize Access <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <div class="footer-text">
            &copy; 2026 Anterin VIP Semarang. All Rights Reserved.
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const pw = document.getElementById('pw').value;
            const btn = e.target.querySelector('button');
            
            // UI Visual Feedback
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Verifying...';
            btn.style.pointerEvents = 'none';
            btn.style.opacity = '0.8';

            setTimeout(() => {
                window.location.href = `/admin?pw=${encodeURIComponent(pw)}`;
            }, 800);
        });
    </script>
</body>
</html>
